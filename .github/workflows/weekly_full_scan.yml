name: Full Market T1 + Screener Scan

on:
  schedule:
    # 🆕 v9.13：每天 3 次掃描（盤後立即抓 → 篩選器資料最新鮮）
    - cron: '35 5 * * 1-5'   # 台股盤後 13:35 台北（TWSE 收盤 13:30）
    - cron: '5 21 * * 1-5'   # 美股盤後 05:05 台北（NYSE 收盤 04:00 台北）
    - cron: '0 1 * * *'      # 每天 09:00 台北（盤前確認）
  workflow_dispatch:    # 手動觸發

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  full_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # 預估 35-40 分鐘，預留 buffer
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy ta twstock requests

      - name: Scan full TW + US T1 imminent
        run: |
          python scan_full_t1_cloud.py 2>&1 | tee /tmp/scan.log

      # 🆕 v9.12：回算過去候選的 5/15/30d outcomes（precision + 報酬）
      - name: Update T1 outcomes (hit-rate tracking)
        run: |
          python update_t1_outcomes.py 2>&1 | tee /tmp/t1_outcomes.log
        continue-on-error: true

      # 🆕 v9.13：全市場篩選器預計算（34 filter × 全 universe → screener_results.json）
      - name: Compute full market screener
        run: |
          python screener_full_cloud.py 2>&1 | tee /tmp/screener.log
        continue-on-error: true

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          FILES="t1_imminent_full.json t1_imminent_history.json screener_results.json"
          if [[ -n $(git status --porcelain $FILES) ]]; then
            git add $FILES
            git commit -m "auto: 全市場 T1 + 篩選器預計算 ($(date +%Y-%m-%d))"
            # 🆕 v9.14：retry push with rebase（避免 concurrent push 衝突）
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push; then
                echo "✅ Updated (attempt $i)"
                echo "changed=true" >> $GITHUB_OUTPUT
                exit 0
              fi
              echo "⚠️ Push attempt $i failed, retry in 5s..."
              sleep 5
            done
            echo "❌ Push failed after 3 retries"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "ℹ️ No changes"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 🆕 v9.12：T1 imminent LINE 推送
      - name: Notify LINE on T1 imminent
        if: steps.commit.outputs.changed == 'true'
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python <<'EOF'
          import json, os, urllib.request

          line_token = os.environ.get('LINE_CHANNEL_TOKEN', '')
          line_user = os.environ.get('LINE_USER_ID', '')
          if not line_token or not line_user:
              print('LINE_CHANNEL_TOKEN / LINE_USER_ID 未設定，跳過')
              exit(0)

          try:
              with open('t1_imminent_full.json', encoding='utf-8') as f:
                  d = json.load(f)
          except Exception as e:
              print(f'parse fail: {e}')
              exit(0)

          tw_list = d.get('tw', [])
          us_list = d.get('us', [])

          # 分 tier
          def by_tier(items, tier):
              return [r for r in items if r.get('tier') == tier]

          tw_l1 = by_tier(tw_list, 'L1_strict')
          tw_l2 = by_tier(tw_list, 'L2_medium')
          us_l1 = by_tier(us_list, 'L1_strict')
          us_l2 = by_tier(us_list, 'L2_medium')

          if not (tw_l1 or tw_l2 or us_l1 or us_l2):
              print('No L1/L2 候選，跳過')
              exit(0)

          lines = ['🎯 全市場 T1 即將上穿（每週掃描）']
          lines.append(f'更新：{d.get("computed_at", "?")}')
          lines.append('')

          for label, items, max_show in [
              ('🇹🇼 L1 嚴格', tw_l1, 8),
              ('🇹🇼 L2 中等', tw_l2, 5),
              ('🇺🇸 L1 嚴格', us_l1, 8),
              ('🇺🇸 L2 中等', us_l2, 5),
          ]:
              if not items: continue
              lines.append(f'{label} ({len(items)} 檔)')
              for r in items[:max_show]:
                  warn = ' ⚠️死叉' if r.get('imminent_dc') else ''
                  ticker = r.get('ticker', '?')
                  name = (r.get('name', '') or '')[:10]
                  dist = r.get('dist_pct', 0)
                  rsi = r.get('rsi', 0) or 0
                  lines.append(f'  {ticker} {name} 距{dist:.2f}% RSI{rsi:.0f}{warn}')
              lines.append('')

          full_msg = '\n'.join(lines)[:4900]
          print(f'Sending LINE:\n{full_msg}')

          line_url = 'https://api.line.me/v2/bot/message/push'
          body = json.dumps({
              'to': line_user,
              'messages': [{'type': 'text', 'text': full_msg}],
          }).encode('utf-8')
          req = urllib.request.Request(line_url, data=body,
              headers={
                  'Content-Type': 'application/json',
                  'Authorization': f'Bearer {line_token}',
              })
          try:
              with urllib.request.urlopen(req, timeout=20) as r:
                  print(f'✅ LINE 推送成功: status {r.status}')
          except urllib.error.HTTPError as e:
              print(f'❌ LINE 推送失敗: {e.code} {e.read().decode()}')
          except Exception as e:
              print(f'❌ LINE 推送失敗: {e}')
          EOF
        continue-on-error: true

      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::❌ Weekly Full Scan FAILED"
          tail -100 /tmp/scan.log 2>/dev/null || echo "(no log)"
