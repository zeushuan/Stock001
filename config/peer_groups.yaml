settings:
  default_lookback_days: 60
  min_correlation: 0.6
  max_spread_percentile: 0.35
  min_lag_today: 0.02       # 今日落後 ≥ 2%
  signal_validity_days: 5
  # Leader thresholds
  leader_return_pct: 0.05    # 漲幅 ≥ 5%
  leader_volume_ratio: 1.5   # 量比 ≥ 1.5
