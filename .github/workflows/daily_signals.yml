name: Daily Signals Update

on:
  schedule:
    # 台股收盤後（13:30 台北 = 05:30 UTC）+ 美股盤後（04:30 台北 = 20:30 UTC 前一日）
    # cron 用 UTC，週一-週五
    - cron: '30 5 * * 1-5'    # 台股收盤後（台北 13:30）
    - cron: '0 22 * * 1-5'    # 美股盤後（台北 06:00 隔日）
  workflow_dispatch:           # 也允許手動觸發
    inputs:
      force_line_test:
        description: '強制發送 LINE 測試訊息（即使 0 警報也送）'
        type: boolean
        default: false

permissions:
  contents: write              # 允許 push 回 repo

env:
  # 🆕 修 Node.js 20 deprecation warning（2026-09-16 將移除）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  update_signals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy ta openpyxl twstock requests

      - name: Update TW + US signals (cloud script)
        id: update
        run: |
          python update_signals_cloud.py 2>&1 | tee /tmp/update.log
        continue-on-error: true

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain top200_signals.json us_top200_signals.json) ]]; then
            git add top200_signals.json us_top200_signals.json
            git commit -m "auto: 自動更新 TW + US TOP 200 訊號 ($(date +%Y-%m-%d))"
            git push
            echo "✅ Signals updated"
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # 🆕 C：LINE Bot 強警報通知
      # 需 GitHub Secrets 設 LINE_CHANNEL_TOKEN + LINE_USER_ID
      # 沒設則 skip，不影響整體流程
      - name: Notify LINE on Strong Alerts
        if: steps.commit.outputs.changed == 'true' || inputs.force_line_test == true
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          FORCE_LINE_TEST: ${{ inputs.force_line_test }}
        run: |
          python <<'EOF'
          import json, os, urllib.request

          line_token = os.environ.get('LINE_CHANNEL_TOKEN', '')
          line_user = os.environ.get('LINE_USER_ID', '')
          force_test = os.environ.get('FORCE_LINE_TEST', '') == 'true'
          if not line_token or not line_user:
              print('LINE_CHANNEL_TOKEN / LINE_USER_ID 未設定，跳過')
              exit(0)

          # 收集強警報（level 5/4 + 即將觸發 imm_bull/imm_bear）
          msgs = []
          imm_msgs = []
          tw_count = us_count = 0
          for f in ['top200_signals.json', 'us_top200_signals.json']:
              try:
                  with open(f, encoding='utf-8') as fp:
                      d = json.load(fp)
                  alerts = d.get('alerts', [])
                  strong = [a for a in alerts if a.get('level') in (5, 4)]
                  imminent = [a for a in alerts
                              if a.get('level') in ('imm_bull', 'imm_bear')]
                  market = '🇹🇼' if ('us' not in f) else '🇺🇸'
                  if 'us' not in f:
                      tw_count = len(alerts)
                  else:
                      us_count = len(alerts)
                  if strong:
                      lines = [f"{market} {len(strong)} 檔強警報"]
                      for a in strong[:8]:
                          lv = a.get('level')
                          star = '★' * (lv if isinstance(lv, int) else 4)
                          side = '🚀' if a.get('side') == 'bull' else '🚨'
                          lines.append(f"  {side} {star} {a['ticker']} "
                                       f"{a.get('name','')[:10]} — {a['tag']}")
                          lines.append(f"    預期 {a.get('expect','')}")
                      msgs.append('\n'.join(lines))
                  if imminent:
                      lines = [f"{market} {len(imminent)} 檔即將觸發 ⏰"]
                      for a in imminent[:5]:
                          side = '🌱' if a.get('side') == 'bull' else '⚠️'
                          lines.append(f"  {side} {a['ticker']} "
                                       f"{a.get('name','')[:10]} — {a['tag']}")
                      imm_msgs.append('\n'.join(lines))
              except Exception as e:
                  print(f'parse {f} fail: {e}')

          all_parts = []
          if msgs: all_parts.append('\n\n'.join(msgs))
          if imm_msgs: all_parts.append('\n\n'.join(imm_msgs))

          if not all_parts:
              if force_test:
                  # 強制測試模式：0 警報也送一則「連線成功」訊息
                  full_msg = (
                      '✅ Stock001 Bot 連線測試成功\n\n'
                      f'今日 TW 警報: {tw_count} 檔\n'
                      f'今日 US 警報: {us_count} 檔\n\n'
                      '若你看到這則訊息，表示：\n'
                      '  • LINE_CHANNEL_TOKEN 有效\n'
                      '  • LINE_USER_ID 正確\n'
                      '  • GitHub Actions → LINE 通道暢通\n\n'
                      '之後有 ★★★★★ 強警報會自動推送到這裡 🚀'
                  )
              else:
                  print('No alerts to notify')
                  exit(0)
          else:
              full_msg = '📊 Stock001 警報\n\n' + '\n\n'.join(all_parts)
          full_msg = full_msg[:4900]  # LINE 5000 字限制
          print(f'Sending to LINE:\n{full_msg}')

          line_url = 'https://api.line.me/v2/bot/message/push'
          body = json.dumps({
              'to': line_user,
              'messages': [{
                  'type': 'text',
                  'text': full_msg,
              }],
          }).encode('utf-8')
          req = urllib.request.Request(line_url, data=body,
              headers={
                  'Content-Type': 'application/json',
                  'Authorization': f'Bearer {line_token}',
              })
          try:
              with urllib.request.urlopen(req, timeout=20) as r:
                  print(f'✅ LINE Bot 推送成功: status {r.status}')
          except urllib.error.HTTPError as e:
              print(f'❌ LINE Bot 推送失敗: {e.code} {e.read().decode()}')
          except Exception as e:
              print(f'❌ LINE Bot 推送失敗: {e}')
          EOF
        continue-on-error: true

      # 🆕 B：失敗通知（GitHub 內建會 email repo owner，這裡額外印日誌）
      - name: Notify on Failure
        if: failure()
        run: |
          echo "::error::❌ Daily Signals Update FAILED"
          echo "::error::請去 https://github.com/${{ github.repository }}/actions 查看 log"
          tail -100 /tmp/update.log 2>/dev/null || echo "(no log)"
