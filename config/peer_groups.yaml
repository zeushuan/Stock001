#  - 新概念股加入時務必 ticker 格式對齊（TW 帶 .TW 後綴；US 純大寫）
#  - leader_candidates 是預設權重最高的領漲候選，但 detect_leaders 仍會掃 members

groups:
  AI_Storage_US:
    description: "AI 儲存超循環族群（HBM/NAND/HDD）"
